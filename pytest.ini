[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts = --strict-markers --tb=short -v
markers =
    unit: Unit tests with no external dependencies
    integration: Integration tests requiring a live database
    statistical: Statistical correctness validation tests
    pipeline: End-to-end pipeline tests
    slow: Tests that exceed 1 second runtime
log_cli = true
log_cli_level = WARNING
log_format = %(asctime)s [%(levelname)s] %(name)s: %(message)s
log_date_format = %Y-%m-%dT%H:%M:%S
